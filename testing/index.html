<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Residual Motion — Testing</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles.css">
    <style>
        #testing-status {
            position: fixed;
            top: 24px;
            left: 24px;
            padding: 16px 20px;
            font-size: 13px;
            color: rgba(255,255,255,0.7);
            font-weight: 300;
            z-index: 10;
        }
        #testing-status .title {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-muted);
            font-weight: 600;
            margin-bottom: 12px;
        }
        #testing-status .status-line {
            margin-bottom: 6px;
        }
        #testing-status .status-line span {
            color: white;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <!-- Hidden video element for pose detection input -->
    <video id="webcam" autoplay playsinline muted style="display:none;"></video>

    <!-- Three.js canvas -->
    <canvas id="neural-network-canvas"></canvas>

    <!-- Loading overlay -->
    <div id="loading-overlay">
        <div class="loading-title">Testing Mode</div>
        <div class="loading-subtitle">Loading...</div>
        <div class="loading-bar"><div class="loading-progress"></div></div>
    </div>

    <!-- Status panel -->
    <div id="testing-status" class="glass-panel">
        <div class="title">Testing</div>
        <div class="status-line">Camera: <span id="status-camera">—</span></div>
        <div class="status-line">Tracking: <span id="status-tracking">—</span></div>
        <div class="status-line">Particles: <span id="status-particles">—</span></div>
        <div class="status-line">FPS: <span id="status-fps">—</span></div>
    </div>

    <!-- Test mode toggle panel -->
    <div id="test-mode-panel" class="glass-panel">
        <div id="test-mode-title">Test Skeleton</div>
        <div class="toggle-row">
            <span class="toggle-label">Synthetic Body</span>
            <label class="toggle-switch">
                <input type="checkbox" id="test-mode-toggle">
                <span class="toggle-slider"></span>
            </label>
        </div>
        <div class="toggle-row">
            <span class="toggle-label">Show Keypoints</span>
            <label class="toggle-switch">
                <input type="checkbox" id="keypoints-toggle">
                <span class="toggle-slider"></span>
            </label>
        </div>
        <div class="toggle-row">
            <span class="toggle-label">Data Overlay</span>
            <label class="toggle-switch">
                <input type="checkbox" id="data-overlay-toggle">
                <span class="toggle-slider"></span>
            </label>
        </div>
    </div>

    <!-- Webcam preview -->
    <div id="webcam-preview" class="glass-panel">
        <video id="webcam-display" autoplay playsinline muted></video>
        <div id="tracking-status">
            <span class="status-dot"></span>
            <span id="tracking-text">Initializing...</span>
        </div>
    </div>

    <!-- Movement metrics -->
    <div id="movement-metrics">
        <div class="metric">
            <span>Motion</span>
            <div class="metric-bar"><div class="metric-fill" id="metric-velocity"></div></div>
        </div>
        <div class="metric">
            <span>Range</span>
            <div class="metric-bar"><div class="metric-fill" id="metric-range"></div></div>
        </div>
        <div class="metric">
            <span>Energy</span>
            <div class="metric-bar"><div class="metric-fill" id="metric-jitter"></div></div>
        </div>
    </div>

    <!-- Control buttons -->
    <div id="control-buttons">
        <button id="pause-play-btn" class="control-button"><span>Freeze</span></button>
        <button id="reset-camera-btn" class="control-button"><span>Reset</span></button>
    </div>

    <!-- TensorFlow.js + MoveNet pose detection -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-core"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-converter"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-webgl"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection"></script>

    <!-- Three.js import map -->
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.182.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.182.0/examples/jsm/"
        }
    }
    </script>

    <!-- Testing app -->
    <script type="module" src="main.js"></script>
</body>
</html>
